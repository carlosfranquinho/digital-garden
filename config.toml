baseURL = "https://carlos.franquinho.info/"
languageCode = "pt-pt"
title = "Carlos Franquinho"
enableRobotsTXT = true
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  author = "Carlos Franquinho"
  description = "Curiosidades, notas e projetos de Carlos Franquinho"
  location = "Marinha Grande, Portugal"
  email = "carlosfranquinho@gmail.com"
  url = "https://carlos.franquinho.info"
  github = "carlosfranquinho"
  facebook = "franquinho"
  instagram = "franqui"
  keywords = ["digital garden", "notas", "programação", "genealogia", "borboletas"]
  favicon = "images/favicon.ico"
  avatar = "/images/avatar.png"
  enableRSS = true
  enableGoogleAnalytics = false
  enableGitalk = false

# Projetos mostrados na homepage.
# Cada projeto pode ter um emoji (icon) ou uma imagem (image = "/images/projects/ficheiro.png").
# Se tiver image, o emoji é ignorado.
[[params.projects]]
  name = "Notas"
  url = "/notas/"
  icon = "🌱"
  description = "Pensamentos e ideias em crescimento."
  external = false

[[params.projects]]
  name = "Franquinho"
  url = "https://www.franquinho.info"
  icon = "🌳"
  # image = "/images/projects/franquinho.png"
  description = "Arquivo genealógico da família Franquinho."
  external = true

[[params.projects]]
  name = "Grupo icarus"
  url = "https://icarus.borboletas.net"
  image = "/images/projects/icarus.webp"
  img_width = 220
  img_height = 97
  description = "Dedicado ao estudo e divulgação das borboletas da Marinha Grande, Leiria, Batalha e Porto de Mós."
  external = true

[[params.projects]]
  name = "Tempo e Lugar"
  url = "https://tempoelugar.franquinho.info"
  image = "/images/projects/tempo-e-lugar.webp"
  img_width = 350
  img_height = 105
  description = "Jorge Corvina ao seu dispor! Destinos através das eras."
  external = true

[[params.projects]]
  name = "Brisas do Pinhal"
  url = "https://brisas.pinhaldorei.net"
  image = "/images/projects/brisas-logo.svg"
  img_width = 82
  img_height = 82
  description = "Os ventos, as chuvas e as temperaturas cá da terra."
  external = true

[[params.projects]]
  name = "Pinhal do Rei"
  url = "https://pinhaldorei.net"
  icon = "🌲"
  # image = "/images/projects/pinhal.png"
  description = "Catedral verde e sussurrante, aonde a luz se ameiga e se esconde e aonde, ecoando a cantar, se alonga e se prolonga a longa voz do mar."
  external = true

[menu]
  [[menu.main]]
    name = "Notas"
    url = "/notas/"
    weight = 3

[permalinks]
  notas = "/notas/:slug/"

[markup]
  [markup.highlight]
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = true
    [markup.goldmark.parser]
      autoHeadingID = true
      [markup.goldmark.parser.attribute]
        block = true
        title = true
      [markup.goldmark.parser.wikilinks]
        enable = true
        linkResolution = "page"
        hrefStyle = "pretty"
      [markup.tableOfContents]
        startLevel = 2
        endLevel = 3
