{{- $link := .Destination -}}
{{- $text := .Text | safeHTML -}}
{{- $isExternal := or (strings.HasPrefix $link "http://") (strings.HasPrefix $link "https://") -}}
{{- if $isExternal -}}
<a href="{{ $link }}" target="_blank" rel="noopener noreferrer">{{ $text }}</a>
{{- else -}}
<a href="{{ $link }}">{{ $text }}</a>
{{- end -}}
