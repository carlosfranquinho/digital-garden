{{ define "main" }}
<style>
.notas-header {
  text-align: center;
  margin-bottom: 4rem;
  margin-top: 1rem;
  animation: fadeInDown 0.8s ease-out;
}

.notas-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.5rem, 5vw, 3.5rem);
  color: var(--text-main);
  margin-bottom: 1rem;
}

.notas-desc {
  font-size: 1.1rem;
  color: var(--text-muted);
}

.notas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
  animation: slideUp 1s ease-out 0.2s both;
}

.nota-card {
  display: flex;
  flex-direction: column;
  padding: 2.5rem;
  text-decoration: none;
  color: inherit;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.nota-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
  opacity: 0;
  transition: var(--transition);
}

.nota-card:hover {
  transform: translateY(-8px);
  border-color: rgba(255, 255, 255, 1);
  background: rgba(255, 255, 255, 0.9);
}

.nota-card:hover::before { opacity: 1; }

.nota-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem;
  font-weight: normal;
  color: var(--text-main);
  margin: 0 0 0.8rem 0;
  position: relative;
  z-index: 1;
}

.nota-meta {
  font-size: 0.85rem;
  color: var(--primary-color);
  font-weight: 600;
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  position: relative;
  z-index: 1;
  background: rgba(59, 130, 246, 0.1);
  padding: 0.3rem 0.8rem;
  border-radius: 999px;
  width: fit-content;
}

.nota-excerpt {
  font-size: 1rem;
  color: var(--text-muted);
  line-height: 1.6;
  position: relative;
  z-index: 1;
}

.nota-arrow {
  position: absolute;
  bottom: 2rem;
  right: 2rem;
  width: 40px;
  height: 40px;
  background: var(--primary-color);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  opacity: 0;
  transform: translateX(-15px);
  transition: var(--transition);
  z-index: 1;
  box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
}

.nota-card:hover .nota-arrow {
  opacity: 1;
  transform: translateX(0);
}

/* @keyframes slideUp e fadeInDown definidos em baseof.html */
</style>

<div class="notas-header">
  <h1 class="notas-title">{{ .Title }}</h1>
  <p class="notas-desc">Exploração, aprendizagem e pensamentos dispersos referentes aos meus interesses.</p>
</div>

<div class="notas-grid">
  {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="glass-card nota-card">
      {{ with .Date }}
      <time datetime="{{ .Format "2006-01-02" }}" class="nota-meta">{{ .Format "02/01/2006" }}</time>
      {{ end }}
      <h3 class="nota-title">{{ .Title }}</h3>
      <div class="nota-excerpt">
        {{ .Plain | truncate 140 }}
      </div>
      <div class="nota-arrow" aria-hidden="true">→</div>
    </a>
  {{ end }}
</div>
{{ end }}
